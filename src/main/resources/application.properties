# gRPC Server Configuration
grpc.server.port=9090

# Security Configuration
api.security.consumer-token=a7e5b1f0-3c8d-4b7a-9f0e-1d2c3b4a5c6d

# ===================================================================
# Bitcoin Core Cluster Configuration (Geo-Redundant High Availability)
# ===================================================================
bitcoin.cluster.primary.alias=btc-cluster-primary
bitcoin.cluster.primary.url=http://user_primary:pass_primary@127.0.0.1:18332/
bitcoin.cluster.primary.rpc-user=user_primary
bitcoin.cluster.primary.rpc-password=pass_primary

bitcoin.cluster.standby.alias=btc-cluster-standby
bitcoin.cluster.standby.url=http://user_standby:pass_standby@10.0.2.100:18332/
bitcoin.cluster.standby.rpc-user=user_standby
bitcoin.cluster.standby.rpc-password=pass_standby

bitcoin.health-check.interval-ms=15000
bitcoin.health-check.max-block-height-difference=10

# ===================================================================
# Third-Party Indexer Configuration (e.g., Alchemy)
# ===================================================================
# Replace with your actual Alchemy API key
indexer.alchemy.api-key=YOUR_ALCHEMY_API_KEY
indexer.alchemy.base-url.btc=https://btc-mainnet.g.alchemy.com/v2/
indexer.alchemy.base-url.eth=https://eth-mainnet.g.alchemy.com/v2/
