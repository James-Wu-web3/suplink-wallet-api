# gRPC Server Configuration
grpc.server.port=9090

# Security Configuration
api.security.consumer-token=a7e5b1f0-3c8d-4b7a-9f0e-1d2c3b4a5c6d

# =============================================
# Bitcoin Core Node Configuration (High Availability)
# =============================================
# Define a list of available Bitcoin nodes.
# The format is bitcoin.nodes[index].property
# We will define two nodes as an example.

# --- Node 0 (Primary) ---
bitcoin.nodes[0].alias=btc-node-primary
bitcoin.nodes[0].url=http://user1:pass1@127.0.0.1:18332/
bitcoin.nodes[0].rpc-user=user1
bitcoin.nodes[0].rpc-password=pass1

# --- Node 1 (Standby) ---
bitcoin.nodes[1].alias=btc-node-standby-1
bitcoin.nodes[1].url=http://user2:pass2@127.0.0.1:28332/
bitcoin.nodes[1].rpc-user=user2
bitcoin.nodes[1].rpc-password=pass2

# Specify the alias of the node to be used as the initial primary node.
bitcoin.primary-node-alias=btc-node-primary

# Health check configuration
bitcoin.health-check.interval-ms=10000
bitcoin.health-check.max-block-height-difference=5
