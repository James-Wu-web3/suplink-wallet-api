syntax = "proto3";

package com.suplink.wallet.grpc;

option java_multiple_files = true;
option java_package = "com.suplink.wallet.grpc";
option java_outer_classname = "WalletProto";

service WalletService {
  rpc ConvertAddress(ConvertAddressRequest) returns (ConvertAddressResponse);
  rpc ValidAddress(ValidAddressRequest) returns (ValidAddressResponse);
  rpc GetLatestBlock(GetLatestBlockRequest) returns (Block);
  rpc GetBlockWithTransactions(GetBlockRequest) returns (Block);
  rpc GetTransactionByHash(GetTransactionByHashRequest) returns (Transaction);
  rpc GetTransactionsByAddress(GetTransactionsByAddressRequest) returns (stream Transaction);
  rpc GetAccountBalance(GetAccountBalanceRequest) returns (GetAccountBalanceResponse);
}

enum ChainType {
  BTC = 0;
  ETH = 1;
  SOL = 2;
}

enum BtcAddressType {
  UNKNOWN = 0;
  P2PKH = 1;  // Legacy
  P2WPKH = 2; // Native SegWit
  P2SH = 3;   // Nested SegWit
  P2TR = 4;   // Taproot
}

message ConvertAddressRequest {
  ChainType chain_type = 1;
  string public_key = 2;
  BtcAddressType address_type = 3;
}

message ConvertAddressResponse {
  string address = 1;
}

message ValidAddressRequest {
  ChainType chain_type = 1;
  string address = 2;
}

message ValidAddressResponse {
  bool is_valid = 1;
}

message GetLatestBlockRequest {
  ChainType chain_type = 1;
}

message GetBlockRequest {
  ChainType chain_type = 1;
  int64 height = 2;
}

message GetTransactionByHashRequest {
  ChainType chain_type = 1;
  string tx_hash = 2;
}

message GetTransactionsByAddressRequest {
  ChainType chain_type = 1;
  string address = 2;
}

message GetAccountBalanceRequest {
    ChainType chain_type = 1;
    string address = 2;
}

message GetAccountBalanceResponse {
    string balance = 1; // Use string for precision
}

message TxInput {
    string address = 1;
    string amount = 2;
}

message TxOutput {
    string address = 1;
    string amount = 2;
}

message Block {
  string hash = 1;
  int64 height = 2;
  int64 timestamp = 3;
  repeated Transaction transactions = 4;
}

message Transaction {
  string hash = 1;
  string block_hash = 2;
  int64 block_height = 3;
  int64 timestamp = 4;
  string status = 5;
  repeated TxInput inputs = 6;
  repeated TxOutput outputs = 7;
}